name: Claude Code

# GITHUB_TOKEN needs contents:read and actions:read — required by
# claude-code-action for restoring trusted config files from the base branch.
# All other GitHub API access uses the App token.
permissions:
  contents: read
  actions: read

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened]

jobs:
  claude:
    uses: synadia-io/ai-workflows/.github/workflows/claude.yml@v2
    with:
      gh_app_id: ${{ vars.CLAUDE_GH_APP_ID }}
      checkout_mode: "base"
      review_focus: |
        Additionally focus on:
        - Swift concurrency safety: verify Sendable conformance and absence of data races in async contexts.
        - Continuation lifecycle: every CheckedContinuation and UnsafeContinuation must be resumed exactly once on all code paths (including cancellation and error paths).
        - NIO channel and event loop correctness: channel pipeline setup, proper promise handling, no blocking calls on event loops, and correct use of eventLoop.execute for state mutations.
        - Public API design: backward compatibility, proper access control, clear error types, and consistent async/await patterns across the API.
    secrets:
      claude_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
      gh_app_private_key: ${{ secrets.CLAUDE_GH_APP_PRIVATE_KEY }}